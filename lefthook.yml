pre-commit:
  parallel: true
  commands:
    gofmt:
      run: gofmt -w {staged_files}
      glob: "*.go"
      stage_fixed: true
    govet:
      run: go vet ./...
    gomodtidy:
      run: |
        go mod tidy
        files=""
        { [ -f go.mod ] && ! git diff --quiet go.mod; } && files="$files go.mod"
        { [ -f go.sum ] && ! git diff --quiet go.sum; } && files="$files go.sum"
        if [ -n "$files" ]; then
          echo "go mod tidy changed:$files — staging"
          git add $files
        fi
      glob: "{go.mod,go.sum,**/*.go}"

commit-msg:
  commands:
    conventional-commits:
      run: |
        msg=$(cat {1})
        pattern='^(feat|fix|docs|chore|refactor|test|ci|perf|style|build|revert)(\(.+\))?: .+'
        if ! echo "$msg" | grep -qE "$pattern"; then
          echo "Invalid commit message: $msg"
          echo "Must match: type(scope)?: description"
          echo "Types: feat fix docs chore refactor test ci perf style build revert"
          exit 1
        fi

pre-push:
  commands:
    test:
      run: go test -race -count=1 ./...
    lint:
      run: |
        if command -v golangci-lint > /dev/null 2>&1; then
          golangci-lint run --timeout=5m
        else
          echo "golangci-lint not found, skipping"
        fi
