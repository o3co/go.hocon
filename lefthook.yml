pre-commit:
  parallel: true
  commands:
    gofmt:
      run: gofmt -w {staged_files}
      glob: "*.go"
      stage_fixed: true
    govet:
      run: go vet ./...

pre-push:
  commands:
    test:
      run: go test -race -count=1 ./...
    lint:
      run: |
        if command -v golangci-lint > /dev/null 2>&1; then
          golangci-lint run --timeout=5m
        else
          echo "golangci-lint not found, skipping"
        fi
