name: Test

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  test:
    name: go${{ matrix.go }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go: ["1.23", "1.24", "1.25"]
        os: [ubuntu-latest]
        include:
          - go: "1.25"
            os: macos-latest
          - go: "1.25"
            os: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Cache expected JSON
        uses: actions/cache@v5
        with:
          path: |
            testdata/expected
            .xx-hocon-version
          key: xx-hocon-expected-${{ hashFiles('.xx-hocon-version') }}
          restore-keys: xx-hocon-expected-

      - name: Fetch expected JSON
        run: make testdata

      - name: Verify modules
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: Test (with race detector)
        run: go test -race -count=1 ./...

      - name: Test with coverage
        if: matrix.go == '1.25' && matrix.os == 'ubuntu-latest'
        # -coverpkg=./... measures coverage of all packages, not just the test
        # package's own statements. Without it, tests in `package hocon_test`
        # (root) that exercise `internal/lexer` / `internal/parser` are not
        # counted toward those packages' coverage, leading to false-negative
        # codecov reports on PRs that add cross-package integration tests.
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic -coverpkg=./... ./...

      - name: Upload coverage to Codecov
        if: matrix.go == '1.25' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: o3co/go.hocon
          files: coverage.out
          fail_ci_if_error: false
